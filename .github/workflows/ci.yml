name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Verify publish tarball
        run: npm pack --dry-run

  test-aim-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/aim-chat
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/aim-chat/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build client package
        run: npm run build
        working-directory: client

      - name: Install dependencies
        # npm install avoids Rollup's optional dependency bug on Linux runners.
        run: npm install

      - name: Install Rollup Linux binary
        run: npm install --no-save @rollup/rollup-linux-x64-gnu@4.59.0

      - name: Run tests
        run: npm test

      - name: Build UI
        run: npm run build

  test-tui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/tui
    steps:
      - uses: actions/checkout@v4

      - name: Install expect
        run: sudo apt-get update && sudo apt-get install -y expect

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/tui/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build client package
        run: npm run build
        working-directory: client

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build TUI
        run: npm run build

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e "python-dist/" && pip install pytest

      - name: Run tests
        run: python -m pytest python-dist/tests/ -v
